services:
  # ---- 前端：Nginx 静态服务 ----
  smartcs-frontend:
    build:
      context: ./SmartCS-frontend
      dockerfile: Dockerfile
    container_name: smartcs-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - INTERNAL_SECRET=${INTERNAL_SECRET:-your-internal-secret-key}
    depends_on:
      smartcs-backend:
        condition: service_healthy
    networks:
      - smartcs-network

  # ---- 后端：FastAPI 服务 ----
  smartcs-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartcs-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@postgres:5432/smartcs
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - smartcs-network

  # ---- PostgreSQL 数据库 ----
  postgres:
    image: postgres:16
    container_name: smartcs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smartcs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - smartcs-network

  # ---- Qdrant 向量数据库 ----
  qdrant:
    image: qdrant/qdrant:latest
    container_name: smartcs-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - smartcs-network

networks:
  smartcs-network:
    driver: bridge

volumes:
  postgres_data:
  qdrant_data:
