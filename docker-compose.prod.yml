services:
  # ---- Caddy: SSL 终止和反向代理 ----
  caddy:
    image: caddy:2-alpine
    container_name: smartcs-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./taoke.com.pem:/etc/caddy/taoke.com.pem:ro
      - ./taoke.com.key:/etc/caddy/taoke.com.key:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - smartcs-frontend
      - smartcs-backend
    networks:
      - smartcs-network

  # ---- 前端：Nginx 静态服务 ----
  smartcs-frontend:
    build:
      context: ./SmartCS-frontend
      dockerfile: Dockerfile
    container_name: smartcs-frontend
    restart: unless-stopped
    # 不暴露端口到宿主机，只通过 Caddy 访问
    expose:
      - "80"
    environment:
      - INTERNAL_SECRET=${INTERNAL_SECRET:-your-internal-secret-key}
    depends_on:
      smartcs-backend:
        condition: service_healthy
    networks:
      - smartcs-network

  # ---- 后端：FastAPI 服务 ----
  smartcs-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartcs-backend
    restart: unless-stopped
    # 不暴露端口到宿主机，只通过 Caddy 访问
    expose:
      - "8000"
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@postgres:5432/smartcs
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - uploads_data:/app/uploads
    networks:
      - smartcs-network

  # ---- PostgreSQL 数据库 ----
  postgres:
    image: postgres:16
    container_name: smartcs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smartcs
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # 不暴露端口到宿主机
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - smartcs-network

  # ---- Qdrant 向量数据库 ----
  qdrant:
    image: qdrant/qdrant:latest
    container_name: smartcs-qdrant
    restart: unless-stopped
    # 不暴露端口到宿主机
    expose:
      - "6333"
      - "6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - smartcs-network

networks:
  smartcs-network:
    driver: bridge

volumes:
  postgres_data:
  qdrant_data:
  caddy_data:
  caddy_config:
  uploads_data:
